name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # هذا السطر تم تعديله ليتناسب مع ملفاتك المرفوعة مباشرة
    - name: Build APK
      run: gradle assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: moon-radar-app
        # تم تعديل المسار هنا ليكون في المجلد الرئيسي
        path: "**/build/outputs/apk/debug/*.apk"
